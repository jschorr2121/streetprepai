name: Resy Sniper — Theodora May 17

on:
  schedule:
    # Runs every minute, 24/7. Each job polls for 55 seconds then exits
    # cleanly so the next job overlaps with no gap.
    - cron: "*/1 * * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub Actions UI

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Poll Resy for Theodora slot
        env:
          RESY_AUTH_TOKEN: ${{ secrets.RESY_AUTH_TOKEN }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Run for 55s so the next cron job (60s later) has a 5s buffer
          MAX_RUNTIME: "55"
          POLL_INTERVAL: "30"
        run: python resy_monitor.py
