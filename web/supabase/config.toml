# Supabase CLI configuration for Street Prep AI.
# See: https://supabase.com/docs/reference/cli/config
#
# Set SUPABASE_PROJECT_ID in your environment or .env.local to link to your
# remote project. The CLI discovers this via `supabase link`.

project_id = "streetprepai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

  [auth.email]
  enable_signup = true
  double_confirm_changes = true
  enable_confirmations = false

  [auth.external.google]
  enabled = false
  client_id = ""
  secret = ""
  redirect_uri = ""

[analytics]
enabled = false
